<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gépész T Kft.</title>
<link rel="stylesheet" href="assets/style.css">
</head>
<body>

<header class="hero">
    <nav class="nav">
        KEZDŐLAP&nbsp;&nbsp;/&nbsp;&nbsp;<a href="eu-tamogatas/">EU TÁMOGATÁS</a>
    </nav>
    <h1>Gépész T Kft.</h1>
</header>

<main class="home-main">
    <section class="home-info">
        <p><strong>Email:</strong> gepeszt.kft.hu@gmail.com</p>
        <p><strong>Profilunk:</strong> Forgácsolás</p>

        <p class="counter-label"><strong>Látogatás számláló:</strong></p>
        <div id="visitor-counter" class="pixel-counter" aria-label="Látogatás számláló"></div>
    </section>

    <img class="logo-home" src="assets/szechenyi2020-300.png" alt="Széchenyi 2020">
</main>

<footer class="footer">
    <div>Gépész T Kft. 2119 Pécel, Rét utca 6.</div>
    <div>Az oldalt a Webnode működteti</div>
</footer>

<script>
(function () {
    const startValue = 635;
    const key = "gepeszt_visit_counter_v4";
    let value = Number(localStorage.getItem(key));

    if (!value || value < startValue) {
        value = startValue;
    } else {
        value += 1;
    }

    localStorage.setItem(key, String(value));

    const padded = String(value).padStart(5, "0");
    const container = document.getElementById("visitor-counter");
    container.innerHTML = "";
    for (const ch of padded) {
        const span = document.createElement("span");
        span.className = "digit";
        span.textContent = ch;
        container.appendChild(span);
    }
})();
</script>

</body>
</html>
